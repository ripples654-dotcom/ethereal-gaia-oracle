<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereal Gaia Oracle - Free</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<style>
    body { 
        margin: 0; padding: 15px;
        background: linear-gradient(135deg, #0a1f0a, #001a11);
        color: #fff;
        font-family: 'Georgia', serif;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
    }
    h1 { color: #ffd700; margin: 20px 0 8px; text-shadow: 0 0 15px #ffd700; font-size: 2.1em; }
    h2 { color: #a8d5a8; margin-bottom: 20px; }

    .pile {
        width: 270px; height: 370px;
        margin: 20px auto;
        background: #111 url('Card-Back.jpg') center/cover;
        border: 14px solid #d4af37;
        border-radius: 22px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        cursor: pointer;
    }

    .drawn {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 22px;
        max-width: 1100px;
        margin: 30px auto;
        padding: 10px;
    }

    .card {
        border: 9px solid #d4af37;
        border-radius: 18px;
        overflow: hidden;
        background: #000;
        cursor: pointer;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        min-height: 340px;
    }

    .card.reversed img { transform: rotate(180deg); }

    .card.reversed::after {
        content: "REVERSED";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 80, 80, 0.95);
        font-size: 19px;
        font-weight: bold;
        z-index: 6;
    }

    .card img { width:100%; height:auto; display:block; }

    .watermark {
        position: absolute;
        bottom: 12px; right: 12px;
        color: rgba(255,215,0,0.65);
        font-size: 13px;
        transform: rotate(-12deg);
        z-index: 5;
    }

    .description {
        margin-top: 12px;
        padding: 16px;
        background: rgba(255,215,0,0.22);
        border: 1px solid #ffd700;
        border-radius: 12px;
        font-size: 16px;
        line-height: 1.5;
        text-align: left;
        display: none;
    }
    .card.show-desc .description { display: block; }

    .drawn.eight-cards { grid-template-columns: repeat(2, 1fr); }

    button {
        padding: 16px 30px;
        margin: 10px 6px;
        font-size: 18px;
        background: #228B22;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>🌿 Ethereal Gaia Oracle</h1>
<h2>Free Version • by Janine Steffens • 2026</h2>

<div class="pile" id="pile" onclick="drawCard()"></div>

<button onclick="newReading(3)">🌱 3-Card Spread</button>
<button onclick="newReading(8)">🌳 8-Card Spread</button>

<div class="drawn" id="drawnCards"></div>

<script>
// ==================== STRONG ANTI-COPY PROTECTION ====================
document.addEventListener('contextmenu', e => {
    e.preventDefault();
    alert("This tool is protected intellectual property.\nPersonal use only.");
});

document.addEventListener('keydown', e => {
    if (e.key === "F12" || 
        (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C")) || 
        (e.ctrlKey && e.key === "u") || 
        (e.ctrlKey && e.key === "s") ||
        (e.ctrlKey && e.key === "p")) {
        e.preventDefault();
        alert("This tool is protected.");
    }
});

// Disable image dragging
document.addEventListener('dragstart', e => e.preventDefault());

// Console warning
console.log("%c⚠️  Ethereal Gaia Oracle is protected intellectual property.\nUnauthorized copying or redistribution is strictly prohibited.", "color:#ffd700; font-size:14px; font-weight:bold;");

// Fingerprint
const fingerprint = btoa(navigator.userAgent + Date.now()).slice(0,12);

// ==================== ORACLE CODE ====================
const cardDescriptions = {
    1:  { up: "Divine timing and patience. Trust life’s natural rhythm.", rev: "Impatience or resistance to timing." },
    2:  { up: "Resilience born from struggle. Deep inner strength.", rev: "Inner tension and old wounds holding you back." },
    // ... (all other 42 cards remain the same as before)
    44: { up: "Deep silence, presence, and sanctuary.", rev: "Restlessness and mental noise." }
};

let currentDeck = [];
const fullDeck = Array.from({length:44}, (_,i) => ({ file: `${i+1}.jpg`, number: i+1 }));

function newReading(num) {
    document.getElementById('drawnCards').innerHTML = '';
    const container = document.getElementById('drawnCards');
    if (num === 8) container.classList.add('eight-cards');
    else container.classList.remove('eight-cards');
    for (let i = 0; i < num; i++) drawCard();
}

function drawCard() {
    if (currentDeck.length === 0) {
        currentDeck = [...fullDeck].sort(() => Math.random() - 0.5);
    }
    const card = currentDeck.pop();
    const isReversed = Math.random() < 0.40;
    const desc = cardDescriptions[card.number];

    const div = document.createElement('div');
    div.className = `card ${isReversed ? 'reversed' : ''}`;
    
    div.innerHTML = `
        <img src="${card.file}" alt="Card ${card.number}" loading="lazy">
        <div class="watermark">© Janine Steffens 2026 • ${fingerprint}</div>
        <div class="description">
            <strong>${isReversed ? "Reversed:" : "Upright:"}</strong><br>
            ${isReversed ? desc.rev : desc.up}
        </div>
    `;

    div.onclick = () => div.classList.toggle('show-desc');
    document.getElementById('drawnCards').prepend(div);
}
</script>

</body>
</html>
