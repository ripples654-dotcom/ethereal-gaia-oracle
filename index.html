<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereal Gaia Oracle - Free</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        margin: 0; padding: 15px;
        background: linear-gradient(135deg, #0a1f0a, #001a11);
        color: #fff;
        font-family: 'Georgia', serif;
        text-align: center;
        user-select: none;
    }
    h1 { color: #ffd700; margin: 15px 0 5px; text-shadow: 0 0 15px #ffd700; font-size: 2.1em; }

    .pile {
        width: 260px; height: 360px;
        margin: 25px auto;
        background: #111 url('Card-Back.jpg') center/cover;
        border: 14px solid #d4af37;
        border-radius: 22px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        cursor: pointer;
    }

    .drawn {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 22px;
        max-width: 1100px;
        margin: 30px auto;
        padding: 10px;
    }

    .card {
        border: 9px solid #d4af37;
        border-radius: 18px;
        overflow: hidden;
        background: #000;
        cursor: pointer;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        transition: transform 0.4s ease;
        transform-style: preserve-3d;
    }
    
    .card.reversed {
        transform: rotate(180deg);
    }

    .card img { 
        width:100%; 
        height:auto; 
        display:block;
        backface-visibility: hidden;
    }

    .watermark {
        position: absolute;
        bottom: 12px; right: 12px;
        color: rgba(255,215,0,0.65);
        font-size: 13px;
        transform: rotate(-12deg);
        pointer-events: none;
        z-index: 5;
    }

    .description {
        margin-top: 12px;
        padding: 16px;
        background: rgba(255,215,0,0.2);
        border: 1px solid #ffd700;
        border-radius: 12px;
        font-size: 16px;
        line-height: 1.5;
        text-align: left;
        display: none;
        z-index: 10;
    }
    .card.show-desc .description { display: block; }

    /* 8-Card Layout */
    .drawn.eight-cards {
        grid-template-columns: repeat(2, 1fr);
    }

    @media (max-width: 768px) {
        .drawn { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 18px; }
        .pile { width: 230px; height: 320px; }
    }
</style>
</head>
<body>

<h1>🌿 Ethereal Gaia Oracle</h1>
<h2>Free Version • by Janine Steffens • 2026</h2>

<div class="pile" id="pile" onclick="drawCard()"></div>
<div class="drawn" id="drawnCards"></div>

<script>
const cardDescriptions = {
    1:  { up: "Divine timing and patience. Trust life’s natural rhythm.", rev: "Impatience or resistance to timing." },
    2:  { up: "Resilience born from struggle. Deep inner strength.", rev: "Inner tension and old wounds holding you back." },
    3:  { up: "Light breaking through darkness. Hope and clarity.", rev: "Temporary darkness or blocked vision." },
    4:  { up: "Grounding and stability. Rooted to the Earth.", rev: "Feeling ungrounded or weighed down." },
    5:  { up: "Beauty after the storm. Emotional healing.", rev: "Delayed blessings or struggling to see beauty." },
    6:  { up: "Hidden truths and intuition. Wisdom in darkness.", rev: "Fear of the unknown or self-deception." },
    7:  { up: "Transformative passion and inner fire.", rev: "Burnout or suppressed anger." },
    8:  { up: "Freedom and higher perspective.", rev: "Feeling scattered or loss of direction." },
    9:  { up: "Calm emotional flow and inner peace.", rev: "Emotional turbulence beneath the surface." },
    10: { up: "New growth and emerging potential.", rev: "Delayed growth or doubting your progress." },
    11: { up: "Surrender and new perspective.", rev: "Resistance to change or feeling stuck." },
    12: { up: "Joyful momentum and playful breakthrough.", rev: "Hesitation or resistance to joy." },
    13: { up: "Grace, beauty, and peaceful transition.", rev: "Disrupted harmony or difficulty accepting change." },
    14: { up: "Inner strength and solitary wisdom.", rev: "Feeling isolated or overly guarded." },
    15: { up: "Purity, grace, and gentle spiritual guidance.", rev: "Feeling lost or doubting your path." },
    16: { up: "Loyalty, friendship, and unconditional love.", rev: "Loneliness or broken trust." },
    17: { up: "Mystery, intuition, and everyday magic.", rev: "Fear of the unknown or ignoring intuition." },
    18: { up: "Clarity in darkness and silent wisdom.", rev: "Blind spots or disconnection from inner knowing." },
    19: { up: "Vision, courage, and higher perspective.", rev: "Feeling trapped in small thinking." },
    20: { up: "Persistence and breakthrough.", rev: "Frustration from lack of progress." },
    21: { up: "Patience, stillness, and graceful timing.", rev: "Impatience or missed opportunities." },
    22: { up: "Resilience in harsh conditions.", rev: "Feeling defensive or underestimating your strength." },
    23: { up: "Sweetness of life and focused joy.", rev: "Overworking without pleasure." },
    24: { up: "Peace, serenity, and spiritual awakening.", rev: "Overwhelm or difficulty finding peace." },
    25: { up: "Community and joyful collaboration.", rev: "Burnout or losing yourself in the group." },
    26: { up: "Mystical emergence and hidden blessings.", rev: "Feeling lost in confusion." },
    27: { up: "Patient preparation and fertile potential.", rev: "Resistance to necessary work." },
    28: { up: "Ancient wisdom and sacred stillness.", rev: "Feeling stagnant or disconnected." },
    29: { up: "Joyful transformation and lightness.", rev: "Feeling stuck in transformation." },
    30: { up: "Gentle journey and emotional balance.", rev: "Emotional blockages or resistance." },
    31: { up: "Ancient strength and deep roots.", rev: "Feeling uprooted or burdened by the past." },
    32: { up: "Endurance, majesty, and inner strength.", rev: "Overwhelmed by obstacles." },
    33: { up: "Grounding in the present and small treasures.", rev: "Overlooking blessings." },
    34: { up: "Crystal clarity and quiet resilience.", rev: "Feeling frozen or lacking clarity." },
    36: { up: "Cascading abundance and breakthrough.", rev: "Blocked flow and emotional stagnation." },
    37: { up: "Deep reflection and inner peace.", rev: "Mental turbulence." },
    38: { up: "Diversity, abundance, and celebration.", rev: "Overwhelm by too many choices." },
    39: { up: "Hidden wisdom and transformation.", rev: "Toxicity or unhealthy growth." },
    40: { up: "New beginnings and awakening.", rev: "Delayed dawn or hesitation." },
    41: { up: "Powerful release and cleansing.", rev: "Destructive chaos or suppressed anger." },
    42: { up: "Graceful transformation and change.", rev: "Stuck in the cocoon stage." },
    43: { up: "Cleverness, adaptability, and instinct.", rev: "Deception or losing trust in instincts." },
    44: { up: "Deep silence, presence, and sanctuary.", rev: "Restlessness and mental noise." }
};

let currentDeck = [];
const fullDeck = Array.from({length:44}, (_,i) => ({
    file: `${i+1}.jpg`,
    number: i+1
}));

function newReading(num) {
    const container = document.getElementById('drawnCards');
    container.innerHTML = '';
    if (num === 8) container.classList.add('eight-cards');
    else container.classList.remove('eight-cards');
    
    for (let i = 0; i < num; i++) drawCard();
}

function drawCard() {
    if (currentDeck.length === 0) {
        currentDeck = [...fullDeck].sort(() => Math.random() - 0.5);
    }
    const card = currentDeck.pop();
    const isReversed = Math.random() < 0.40;
    const desc = cardDescriptions[card.number] || {up: "A gentle message from Gaia.", rev: ""};

    const div = document.createElement('div');
    div.className = `card ${isReversed ? 'reversed' : ''}`;
    
    div.innerHTML = `
        <img src="${card.file}" alt="Card ${card.number}">
        <div class="watermark">© Janine Steffens 2026</div>
        <div class="description">
            <strong>${isReversed ? "Reversed:" : "Upright:"}</strong><br>
            ${isReversed ? desc.rev : desc.up}
        </div>
    `;

    div.onclick = () => div.classList.toggle('show-desc');
    document.getElementById('drawnCards').prepend(div);
}
</script>

<button onclick="newReading(3)">🌱 3-Card Spread</button>
<button onclick="newReading(8)">🌳 8-Card Spread</button>

</body>
</html>
