<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereal Gaia Oracle - Free</title>
<style>
    body { 
        margin: 0; padding: 20px;
        background: linear-gradient(135deg, #0a1f0a, #001a11);
        color: #fff;
        font-family: 'Georgia', serif;
        text-align: center;
        user-select: none;
    }
    .card {
        border: 8px solid #d4af37;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
        cursor: pointer;
        position: relative;
    }
    .watermark {
        position: absolute;
        bottom: 12px;
        right: 12px;
        color: rgba(255, 215, 0, 0.45);
        font-size: 13px;
        font-weight: bold;
        transform: rotate(-12deg);
        text-shadow: 0 0 4px black;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>

<!-- (Keep your existing header, buttons, etc. - I'm only showing the important changed part) -->

<div class="pile" id="pile" onclick="drawCard()"></div>
<div class="drawn" id="drawnCards"></div>

<script>
// ... (anti-copy code stays the same)

function drawCard() {
    if (currentDeck.length === 0) {
        currentDeck = [...fullDeck].sort(() => Math.random() - 0.5);
    }
    const card = currentDeck.pop();
    const isReversed = Math.random() < 0.40;

    const div = document.createElement('div');
    div.className = `card ${isReversed ? 'reversed' : ''}`;
    
    div.innerHTML = `
        <img src="${card.file}" alt="${card.name}">
        <div class="label">${card.name}</div>
        <div class="watermark">© Janine Steffens 2026</div>
    `;
    
    div.onclick = () => div.classList.toggle('reversed');
    document.getElementById('drawnCards').prepend(div);
}
</script>
</body>
</html>
