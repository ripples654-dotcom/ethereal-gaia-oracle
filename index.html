        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
        gap: 22px;
        max-width: 1400px;
        margin: 40px auto;
        padding: 0 10px;

    .card {
        border: 6px solid #d4af37;
        border-radius: 14px;
        overflow: hidden;
        background: #111;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        transition: all 0.4s;
        cursor: pointer;
    }
    .card:hover { transform: scale(1.04); }
    .card img { width:100%; height:auto; display:block; }
    .card.reversed { transform: rotate(180deg); }
    .label { padding: 12px; background: rgba(0,0,0,0.85); color: #ffd700; font-size: 1.02em; }
    .meaning { padding: 10px 12px; font-size: 0.94em; color: #c8e6c8; text-align: left; max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .card.expanded .meaning { max-height: 380px; }
