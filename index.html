<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereal Gaia Oracle - Free</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        margin: 0; padding: 15px;
        background: linear-gradient(135deg, #0a1f0a, #001a11);
        color: #fff;
        font-family: 'Georgia', serif;
        text-align: center;
        user-select: none;
    }
    h1 { color: #ffd700; margin: 15px 0 5px; text-shadow: 0 0 15px #ffd700; }
    .card {
        border: 8px solid #d4af37;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
        cursor: pointer;
        position: relative;
        transition: all 0.3s;
    }
    .card:active { transform: scale(0.97); }
    .watermark {
        position: absolute;
        bottom: 12px; right: 12px;
        color: rgba(255,215,0,0.6);
        font-size: 13px;
        transform: rotate(-12deg);
        pointer-events: none;
    }
    .description {
        margin-top: 8px;
        padding: 12px;
        background: rgba(255,215,0,0.15);
        border: 1px solid #ffd700;
        border-radius: 10px;
        font-size: 15px;
        line-height: 1.4;
        min-height: 50px;
        display: none;
    }
    .card.show-desc .description { display: block; }
</style>
</head>
<body>

<h1>🌿 Ethereal Gaia Oracle</h1>
<h2>Free Version • by Janine Steffens • 2026</h2>

<div class="pile" id="pile" onclick="drawCard()"></div>
<div class="drawn" id="drawnCards"></div>

<script>
// Short descriptions for Free Version (you can edit these later)
const cardDescriptions = {
    1: "New beginnings and fresh opportunities.",
    2: "Balance, harmony, and partnerships.",
    3: "Growth, creativity, and abundance.",
    // Add all 44 here... For now using placeholders
};

for (let i = 4; i <= 44; i++) {
    cardDescriptions[i] = `Card ${i} - Guidance from Gaia.`;
}

let currentDeck = [];
const fullDeck = Array.from({length:44}, (_,i) => ({
    file: `${i+1}.jpg`,
    number: i+1
}));

function drawCard() {
    if (currentDeck.length === 0) {
        currentDeck = [...fullDeck].sort(() => Math.random() - 0.5);
    }
    const card = currentDeck.pop();
    const isReversed = Math.random() < 0.40;

    const div = document.createElement('div');
    div.className = `card ${isReversed ? 'reversed' : ''}`;
    
    div.innerHTML = `
        <img src="${card.file}" alt="Card ${card.number}">
        <div class="watermark">© Janine 2026</div>
        <div class="description">
            ${isReversed ? "Reversed: " : ""}
            ${cardDescriptions[card.number] || "A message from Gaia."}
        </div>
    `;

    div.onclick = () => {
        div.classList.toggle('show-desc');
    };

    document.getElementById('drawnCards').prepend(div);
}

function newReading(num) {
    document.getElementById('drawnCards').innerHTML = '';
    for (let i = 0; i < num; i++) drawCard();
}
</script>

<button onclick="newReading(3)">🌱 3-Card Spread</button>
<button onclick="newReading(8)">🌳 8-Card Spread</button>

</body>
</html>
