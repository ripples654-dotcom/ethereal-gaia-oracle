<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethereal Gaia Oracle - Free</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        margin: 0; padding: 15px;
        background: linear-gradient(135deg, #0a1f0a, #001a11);
        color: #fff;
        font-family: 'Georgia', serif;
        text-align: center;
        user-select: none;
    }
    h1 { color: #ffd700; margin: 15px 0 5px; text-shadow: 0 0 15px #ffd700; font-size: 2.1em; }

    .pile {
        width: 260px; height: 360px;
        margin: 25px auto;
        background: #111 url('Card-Back.jpg') center/cover;
        border: 14px solid #d4af37;
        border-radius: 22px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        cursor: pointer;
    }

    .drawn {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 22px;
        max-width: 1100px;
        margin: 30px auto;
        padding: 10px;
    }

    .card {
        border: 9px solid #d4af37;
        border-radius: 18px;
        overflow: hidden;
        background: #000;
        cursor: pointer;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        min-height: 320px;
    }

    .card.reversed { transform: rotate(180deg); }

    .card img { 
        width:100%; 
        height:auto; 
        display:block;
    }

    /* Loading placeholder */
    .card.loading img {
        opacity: 0.3;
    }

    .watermark {
        position: absolute;
        bottom: 12px; right: 12px;
        color: rgba(255,215,0,0.65);
        font-size: 13px;
        transform: rotate(-12deg);
        pointer-events: none;
        z-index: 5;
    }

    .description {
        margin-top: 12px;
        padding: 16px;
        background: rgba(255,215,0,0.2);
        border: 1px solid #ffd700;
        border-radius: 12px;
        font-size: 16px;
        line-height: 1.5;
        text-align: left;
        display: none;
    }
    .card.show-desc .description { display: block; }

    .drawn.eight-cards {
        grid-template-columns: repeat(2, 1fr);
    }
</style>
</head>
<body>

<h1>🌿 Ethereal Gaia Oracle</h1>
<h2>Free Version • by Janine Steffens • 2026</h2>

<div class="pile" id="pile" onclick="drawCard()"></div>
<div class="drawn" id="drawnCards"></div>

<script>
const cardDescriptions = {
    // Paste all 44 descriptions here (same as before)
    1:  { up: "Divine timing and patience. Trust life’s natural rhythm.", rev: "Impatience or resistance to timing." },
    // ... (add the rest)
};

let currentDeck = [];
const fullDeck = Array.from({length:44}, (_,i) => ({
    file: `${i+1}.jpg`,
    number: i+1
}));

function newReading(num) {
    const container = document.getElementById('drawnCards');
    container.innerHTML = '';
    if (num === 8) container.classList.add('eight-cards');
    else container.classList.remove('eight-cards');
    
    for (let i = 0; i < num; i++) drawCard();
}

function drawCard() {
    if (currentDeck.length === 0) {
        currentDeck = [...fullDeck].sort(() => Math.random() - 0.5);
    }
    const card = currentDeck.pop();
    const isReversed = Math.random() < 0.40;
    const desc = cardDescriptions[card.number] || {up: "A gentle message from Gaia.", rev: ""};

    const div = document.createElement('div');
    div.className = `card ${isReversed ? 'reversed' : ''} loading`;
    
    div.innerHTML = `
        <img src="${card.file}" alt="Card ${card.number}" loading="lazy">
        <div class="watermark">© Janine Steffens 2026</div>
        <div class="description">
            <strong>${isReversed ? "Reversed:" : "Upright:"}</strong><br>
            ${isReversed ? desc.rev : desc.up}
        </div>
    `;

    // Remove loading class when image loads
    div.querySelector('img').onload = () => div.classList.remove('loading');
    div.querySelector('img').onerror = () => {
        div.querySelector('img').src = 'Card-Back.jpg';
    };

    div.onclick = () => div.classList.toggle('show-desc');
    document.getElementById('drawnCards').prepend(div);
}
</script>

<button onclick="newReading(3)">🌱 3-Card Spread</button>
<button onclick="newReading(8)">🌳 8-Card Spread</button>

</body>
</html>
